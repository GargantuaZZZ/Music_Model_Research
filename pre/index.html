<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>音乐大模型调研</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="deck">
      <header class="hero">
        <div>
          <p class="eyebrow">Music Foundation Model Survey</p>
          <h1>音乐大模型调研</h1>
          <p class="subtitle">钟浩然</p>
        </div>
      </header>

      <section class="section section-elements" aria-labelledby="elements-title">
        <div class="section-heading">
          <p class="index">01</p>
          <div>
            <p class="eyebrow">Elements</p>
            <h2 id="elements-title">元素</h2>
          </div>
        </div>

        <div class="element-map" aria-label="音乐大模型元素二维分布图">
          <div class="axis axis-x">
            <span>离散 / 符号</span>
            <span>连续 / 信号</span>
          </div>
          <div class="axis axis-y">
            <span>可解释</span>
            <span>感知表达</span>
          </div>

          <div class="bubble bubble-audio">
            <span>音频</span>
          </div>
          <div class="bubble bubble-midi">
            <span>MIDI</span>
          </div>
          <div class="bubble bubble-score">
            <span>乐谱</span>
          </div>
          <div class="bubble bubble-lyrics">
            <span>歌词</span>
          </div>
          <div class="bubble bubble-understanding">
            <span>理解</span>
          </div>
        </div>
      </section>

      <section class="section-grid" aria-label="汇报结构">
        <article class="topic-card">
          <p class="index">02</p>
          <h2>功能</h2>
          <div class="empty-state"></div>
        </article>

        <article class="topic-card">
          <p class="index">03</p>
          <h2>数据集</h2>
          <div class="empty-state"></div>
        </article>

        <article class="topic-card">
          <p class="index">04</p>
          <h2>评价指标</h2>
          <div class="empty-state"></div>
        </article>

        <article class="topic-card">
          <p class="index">05</p>
          <h2>Baseline</h2>
          <div class="empty-state"></div>
        </article>
      </section>
    </main>
  </body>
</html>
